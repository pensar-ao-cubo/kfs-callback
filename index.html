<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>KFS - Auth Callback</title></head>
<body>
<h2>Autenticação concluída</h2>
<p id="msg">A processar...</p>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    document.getElementById('msg').innerHTML = 
      '<strong>Code:</strong><br><code style="word-break:break-all">' + code + '</code>';
  } else {
    document.getElementById('msg').textContent = 'Sem code no URL.';
  }
</script>
</body>
</html>
